<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>敵選択</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>敵を選択</h2>

<!-- ステータス表示 -->
<div id="status"></div>

<hr>

<!-- 敵一覧 -->
<div id="list"></div>

<!-- 設定 -->
<br>
<button onclick="save()">保存</button>
<button onclick="resetData()">データ削除</button>

<script src="data.js"></script>
<script src="player.js"></script>
<script src="main.js"></script>

<script>
// ===== ステータス表示 =====
function drawStatus(){
  const s = document.getElementById("status");

  s.innerHTML =
    "HP: " + player.hp + "/" + player.maxHP + "<br>" +
    "攻撃: " + player.atk + "<br>" +
    "クリ率: " + player.crit + "%<br>" +
    "素材: " + JSON.stringify(player.items);
}

// ===== データ削除 =====
function resetData(){
  localStorage.removeItem("player");
  location.reload();
}

// ===== 初期表示 =====
setInterval(()=>{
  fixHP();
  drawStatus();
}, 500);

</script>

</body>
</html>
