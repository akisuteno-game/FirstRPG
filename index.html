<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RPG+</title>

<style>
body {
  background:black;
  color:#0f0;
  font-family:monospace;
  text-align:center;
}

#game {
  width:420px;
  margin:auto;
  border:2px solid #0f0;
  padding:10px;
}

button {
  margin:5px;
  padding:8px;
  background:black;
  color:#0f0;
  border:1px solid #0f0;
}

#menu {
  margin-top:10px;
  border:1px solid #0f0;
  padding:5px;
}
</style>
</head>

<body>

<h2>⚔ RPG+</h2>

<div id="game">

<div id="enemyName"></div>
HP:<span id="enemyHP"></span><br><br>

Lv:<span id="level"></span>
HP:<span id="playerHP"></span>
SP:<span id="sp"></span>

<div id="text"></div>

<button onclick="attack()">攻撃</button>
<button onclick="openSkill()">スキル</button>
<button onclick="openEquip()">装備</button>
<button onclick="showStatus()">ステータス</button>
<button onclick="save()">セーブ</button>

<div id="menu"></div>

</div>

<script>
// ===== プレイヤー =====
let player = {
  hp:20,
  maxHP:20,
  atk:3,
  level:1,
  exp:0,
  sp:0,
  equip:{
    weapon:0,
    armor:0
  },
  skills:{
    atkUp:0,
    hpUp:0
  }
};

// ===== 装備 =====
const weapons = [
  {name:"なし", atk:0},
  {name:"剣", atk:2},
  {name:"炎の剣", atk:5}
];

const armors = [
  {name:"なし", hp:0},
  {name:"革の鎧", hp:5},
  {name:"鉄の鎧", hp:10}
];

// ===== 敵 =====
const enemies = [
  {name:"スライム", hp:10},
  {name:"ゴブリン", hp:15},
  {name:"ドラゴン", hp:25}
];

let enemy;

// ===== 初期化 =====
function spawn(){
  enemy = {...enemies[Math.floor(Math.random()*enemies.length)]};
  setText(enemy.name+" 出現！");
}

// ===== 計算 =====
function getAtk(){
  return player.atk + weapons[player.equip.weapon].atk + player.skills.atkUp;
}

function getMaxHP(){
  return player.maxHP + armors[player.equip.armor].hp + player.skills.hpUp*5;
}

// ===== テキスト =====
function setText(msg){
  document.getElementById("text").innerText = msg;
}

// ===== 攻撃 =====
function attack(){
  let dmg = getAtk();
  enemy.hp -= dmg;
  setText("攻撃 "+dmg);

  if(enemy.hp <= 0){
    win();
  }

  update();
}

// ===== 勝利 =====
function win(){
  player.exp += 5;
  player.sp += 1;

  if(player.exp >= 10){
    player.level++;
    player.exp = 0;
    player.maxHP += 5;
    player.hp = getMaxHP();
    setText("Lvアップ！");
  } else {
    setText("勝利！");
  }

  setTimeout(spawn,1000);
}

// ===== スキル =====
function openSkill(){
  let html = "<h3>スキル</h3>";
  html += "攻撃UP Lv"+player.skills.atkUp+
    " <button onclick='upSkill(\"atkUp\")'>+</button><br>";
  html += "HP強化 Lv"+player.skills.hpUp+
    " <button onclick='upSkill(\"hpUp\")'>+</button><br>";

  document.getElementById("menu").innerHTML = html;
}

function upSkill(type){
  if(player.sp <= 0) return;

  player.skills[type]++;
  player.sp--;
  update();
  openSkill();
}

// ===== 装備 =====
function openEquip(){
  let html = "<h3>装備</h3>";

  html += "武器:<br>";
  weapons.forEach((w,i)=>{
    html += w.name+" <button onclick='equipW("+i+")'>装備</button><br>";
  });

  html += "<br>防具:<br>";
  armors.forEach((a,i)=>{
    html += a.name+" <button onclick='equipA("+i+")'>装備</button><br>";
  });

  document.getElementById("menu").innerHTML = html;
}

function equipW(i){
  player.equip.weapon = i;
  update();
}

function equipA(i){
  player.equip.armor = i;
  player.hp = getMaxHP();
  update();
}

// ===== ステータス表示 =====
function showStatus(){
  let text = "<h3>ステータス</h3>";

  text += "Lv: " + player.level + "<br>";
  text += "HP: " + player.hp + " / " + getMaxHP() + "<br>";
  text += "攻撃力: " + getAtk() + "<br>";
  text += "SP: " + player.sp + "<br><br>";

  text += "武器: " + weapons[player.equip.weapon].name + "<br>";
  text += "防具: " + armors[player.equip.armor].name + "<br><br>";

  text += "スキル<br>";
  text += "攻撃UP: Lv" + player.skills.atkUp + "<br>";
  text += "HP強化: Lv" + player.skills.hpUp + "<br>";

  document.getElementById("menu").innerHTML = text;
}

// ===== UI =====
function update(){
  document.getElementById("enemyName").innerText = enemy.name;
  document.getElementById("enemyHP").innerText = enemy.hp;
  document.getElementById("level").innerText = player.level;
  document.getElementById("playerHP").innerText = player.hp+"/"+getMaxHP();
  document.getElementById("sp").innerText = player.sp;
}

// ===== セーブ =====
function save(){
  localStorage.setItem("save", JSON.stringify(player));
  setText("セーブ完了");
}

function load(){
  let data = localStorage.getItem("save");
  if(data){
    player = JSON.parse(data);
  }
}

// ===== スタート =====
load();
spawn();
update();
</script>

</body>
</html>
