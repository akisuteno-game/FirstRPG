<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>First RPG</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/panel.css">
  <link rel="stylesheet" href="css/tab.css">
</head>


<body>

  <!-- 左 -->
  <div id="side">

    <h2>
      ステータス
    </h2>

    <div id="playerUI">
    </div>

  </div>



  <!-- 右 -->
  <div id="main">


    <!-- タブ -->
    <div id="tabs">

      <button
        class="tabBtn"

        onclick="
          showTab(
            'enemyTab'
          )
        "
      >
        敵選択
      </button>


      <button
        class="tabBtn"

        onclick="
          showTab(
            'upgradeTab'
          )
        "
      >
        強化
      </button>


      <button
        class="tabBtn"

        onclick="
          showTab(
            'settingTab'
          )
        "
      >
        設定
      </button>

    </div>



    <!-- 真ん中 -->
    <div id="topArea">


      <!-- 敵 -->
      <div
        id="enemyTab"

        class="
          tabPage
          activePage
        "
      >

        <div
          id="list"
        >
        </div>

      </div>



      <!-- 強化 -->
      <div
        id="upgradeTab"

        class="
          tabPage
        "
      >
      </div>



      <!-- 設定 -->
      <div
        id="settingTab"

        class="
          tabPage
        "
      >
      </div>


    </div>



    <!-- 下 -->
    <div id="battleArea">

      バトル準備OK

    </div>


  </div>



<script src="data.js"></script>

<script src="player.js"></script>

<script src="enemyTab.js"></script>

<script src="upgradeTab.js"></script>

<script src="settingTab.js"></script>

<script src="main.js"></script>


</body>
</html>
