<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RPGi</title>

<style>
body { background:#111; color:#eee; font-family:monospace; margin:0; }
#container { display:flex; }

#statusPanel {
  width:220px;
  border-right:2px solid #444;
  padding:10px;
  background:#1a1a1a;
}

#game { flex:1; padding:10px; }

button {
  margin:5px;
  padding:8px;
  background:#333;
  color:white;
  border:1px solid #888;
}

.bar { width:100%; height:12px; background:#333; margin-bottom:5px; }
.fill { height:100%; width:0%; background:cyan; }

#menu {
  margin-top:10px;
  border:1px solid #555;
  padding:5px;
  background:#222;
}
</style>
</head>

<body>

<div id="container">

<div id="statusPanel">
  <h3>ステータス</h3>

  Lv:<span id="level"></span><br>

  HP:
  <div class="bar"><div id="hpBar" class="fill"></div></div>
  <span id="playerHP"></span><br>

  攻撃:<span id="atk"></span><br>
  クリ率:<span id="critRate"></span>%<br>
  クリ倍率:<span id="critDmg"></span>x<br><br>

  <b>行動ゲージ</b>
  <div class="bar"><div id="playerGaugeBar" class="fill"></div></div>

  EXP:<span id="exp"></span>/<span id="nextExp"></span><br><br>

  <b>素材</b>
  <div id="items"></div>
</div>

<div id="game">

<div id="enemyName"></div>

HP:
<div class="bar"><div id="enemyBar" class="fill"></div></div>
<span id="enemyHP"></span>

<div class="bar"><div id="enemyGaugeBar" class="fill"></div></div>

<br>

<div id="text"></div>

<button id="attackBtn" onclick="attack()">攻撃</button>
<button onclick="openUpgrade()">強化</button>
<button onclick="openSetting()">設定</button>

<div id="menu"></div>

</div>

</div>

<script>

// ===== プレイヤー =====
let player = {
  hp:20,maxHP:20,atk:3,
  level:1,exp:0,nextExp:10,
  critRate:10,critDmg:1.5,
  gauge:0,speed:1.2,
  items:{}
};

// ===== 敵 =====
const enemies = [
  {name:"スライム", hp:10, drop:"ゼリー", rare:"核", speed:1},
  {name:"ゴブリン", hp:15, drop:"牙", rare:"鋭牙", speed:1.3},
  {name:"ドラゴン", hp:30, drop:"鱗", rare:"心臓", speed:0.7}
];

let enemy;

// ===== 初期化 =====
function spawn(){
  enemy = {...enemies[Math.random()*enemies.length|0]};
  enemy.maxHP = enemy.hp;
  enemy.gauge = 0;
  setText(enemy.name+" 出現！");
}

// ===== 攻撃 =====
function attack(){
  if(player.gauge < 100) return;

  player.gauge = 0;

  let dmg = player.atk;
  if(Math.random()*100 < player.critRate){
    dmg = Math.floor(dmg*player.critDmg);
    setText("クリティカル！ "+dmg);
  } else {
    setText("攻撃 "+dmg);
  }

  enemy.hp -= dmg;

  if(enemy.hp <= 0) win();
}

// ===== 敵攻撃 =====
function enemyAttack(){
  let dmg = Math.floor(Math.random()*4)+1;
  player.hp -= dmg;
  setText(enemy.name+" の攻撃 "+dmg);

  if(player.hp <= 0){
    setText("ゲームオーバー");
  }
}

// ===== 勝利 =====
function win(){
  player.exp += 5;
  addItem(enemy.drop,1);

  if(Math.random()<0.2){
    addItem(enemy.rare,1);
  }

  if(player.exp >= player.nextExp){
    player.level++;
    player.exp=0;
    player.nextExp=Math.floor(player.nextExp*1.5);
    player.maxHP+=5;
    player.hp=player.maxHP;
  }

  setTimeout(spawn,1000);
}

// ===== ループ（重要） =====
function loop(){
  player.gauge += player.speed;
  enemy.gauge += enemy.speed;

  if(player.gauge > 100) player.gauge = 100;

  if(enemy.gauge >= 100){
    enemy.gauge = 0;
    enemyAttack();
  }

  update();
  requestAnimationFrame(loop);
}

// ===== UI =====
function update(){
  document.getElementById("enemyName").innerText = enemy.name;
  document.getElementById("enemyHP").innerText = enemy.hp+"/"+enemy.maxHP;

  document.getElementById("level").innerText = player.level;
  document.getElementById("playerHP").innerText = player.hp+"/"+player.maxHP;

  document.getElementById("atk").innerText = player.atk;
  document.getElementById("critRate").innerText = player.critRate;
  document.getElementById("critDmg").innerText = player.critDmg;

  document.getElementById("exp").innerText = player.exp;
  document.getElementById("nextExp").innerText = player.nextExp;

  // HPバー色
  let ratio = player.hp/player.maxHP;
  let bar = document.getElementById("hpBar");
  bar.style.width = ratio*100+"%";

  if(ratio < 0.1) bar.style.background="red";
  else if(ratio < 0.5) bar.style.background="orange";
  else bar.style.background="lime";

  // ゲージ
  document.getElementById("playerGaugeBar").style.width = player.gauge+"%";
  document.getElementById("enemyGaugeBar").style.width = enemy.gauge+"%";

  // ボタン制御
  document.getElementById("attackBtn").disabled = player.gauge < 100;

  let html="";
  for(let k in player.items){
    html += k+"："+player.items[k]+"<br>";
  }
  document.getElementById("items").innerHTML = html;
}

// ===== その他 =====
function addItem(n,c){
  if(!player.items[n]) player.items[n]=0;
  player.items[n]+=c;
}

function setText(t){
  document.getElementById("text").innerText = t;
}

function openUpgrade(){
  let html="<h3>強化</h3>";
  html+="クリ率+5%（核2）<button onclick='upCrit()'>+</button>";
  document.getElementById("menu").innerHTML=html;
}

function upCrit(){
  if((player.items["核"]||0)<2) return;
  player.items["核"]-=2;
  player.critRate+=5;
}

function openSetting(){
  document.getElementById("menu").innerHTML=
    "<button onclick='save()'>セーブ</button><br>"+
    "<button onclick='resetData()'>削除</button>";
}

function save(){
  localStorage.setItem("save",JSON.stringify(player));
}

function load(){
  let d=localStorage.getItem("save");
  if(d){
    player=JSON.parse(d);
    if(!player.items) player.items={};
  }
}

function resetData(){
  localStorage.clear();
  location.reload();
}

// ===== スタート =====
load();
spawn();
loop();

</script>

</body>
</html>
