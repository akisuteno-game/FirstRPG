<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RPG</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 左 -->
<div id="side">

  <div id="status"></div>

</div>


<!-- 右 -->
<div id="main">

  <!-- 上 -->
  <div id="tabs">

    <button
      class="tabBtn"
      onclick="showTab('enemyTab')">

      敵選択

    </button>


    <button
      class="tabBtn"
      onclick="showTab('upgradeTab')">

      強化

    </button>


    <button
      class="tabBtn"
      onclick="showTab('settingTab')">

      設定

    </button>

  </div>


  <!-- 真ん中 -->
  <div id="topArea">

    <div
      id="enemyTab"
      class="tabPage activePage">

      <div id="list"></div>

    </div>


    <div
      id="upgradeTab"
      class="tabPage">

      <button
        onclick="upgradeAtk()">

        攻撃+1

      </button>

    </div>


    <div
      id="settingTab"
      class="tabPage">

      <button
        onclick="save()">

        保存

      </button>

      <button
        onclick="resetData()">

        リセット

      </button>

    </div>

  </div>


  <!-- 下 -->
  <div id="battleArea">

    放置RPG

  </div>

</div>

<script src="data.js"></script>
<script src="player.js"></script>
<script src="main.js"></script>

</body>
</html>
