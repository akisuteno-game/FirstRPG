<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>First RPG</title>
  <link rel="stylesheet" href="style.css?v=9999">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: row;
      background: #111;
    }

    #side {
      width: 190px;
      min-width: 190px;
      max-width: 190px;
      height: 100%;
      background: #0f0f0f;
      border-right: 1px solid #222;
      padding: 10px 8px;
      overflow-y: auto;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    #side h2 {
      font-size: 13px;
      color: #555;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      min-width: 0;
    }

    #tabs {
      display: flex;
      height: 44px;
      border-bottom: 1px solid #1e1e1e;
      flex-shrink: 0;
    }

    .tabBtn {
      flex: 1;
      border: none;
      border-right: 1px solid #1a1a1a;
      background: #0d0d0d;
      color: #666;
      font-size: 12px;
      min-width: 0;
      min-height: unset;
      padding: 0 2px;
      font-family: monospace;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tabBtn:last-child { border-right: none; }
    .tabBtn:hover  { background: #151515; color: #bbb; }
    .tabBtn.active { color: white; border-bottom: 2px solid #6666ff; background: #111; }

    #frameArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    #frameArea iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      background: #0a0a0a;
    }

    #frameArea iframe.activeFrame {
      display: block;
    }
  </style>
</head>
<body>

  <div id="side">
    <h2>STATUS</h2>
    <div id="playerUI">読み込み中...</div>
  </div>

  <div id="main">
    <div id="tabs">
      <button class="tabBtn active" onclick="showTab('enemy',this)">敵</button>
      <button class="tabBtn" onclick="showTab('upgrade',this)">強化</button>
      <button class="tabBtn" onclick="showTab('skill',this)">スキル</button>
      <button class="tabBtn" onclick="showTab('craft',this)">装備</button>
      <button class="tabBtn" onclick="showTab('material',this)">素材</button>
      <button class="tabBtn" onclick="showTab('rebirth',this)">転生</button>
      <button class="tabBtn" onclick="showTab('setting',this)">設定</button>
    </div>
    <div id="frameArea">
      <iframe id="frame-enemy"    src="tabs/enemy.html"            class="activeFrame"></iframe>
      <iframe id="frame-upgrade"  data-src="tabs/upgrade.html"></iframe>
      <iframe id="frame-skill"    data-src="tabs/skill.html"></iframe>
      <iframe id="frame-craft"    data-src="tabs/craft.html"></iframe>
      <iframe id="frame-material" data-src="tabs/material.html"></iframe>
      <iframe id="frame-rebirth"  data-src="tabs/rebirth.html"></iframe>
      <iframe id="frame-setting"  data-src="tabs/setting.html"></iframe>
    </div>
  </div>

  <script src="data.js?v=9999"></script>
  <script src="js/player_data.js?v=9999"></script>
  <script src="js/player_material.js?v=9999"></script>
  <script src="js/player_render.js?v=9999"></script>
  <script src="js/player_heal.js?v=9999"></script>

  <script>
    function showTab(name, btn){
      document.querySelectorAll(".tabBtn").forEach(function(b){
        b.classList.remove("active");
      });
      if(btn){ btn.classList.add("active"); }

      document.querySelectorAll("#frameArea iframe").forEach(function(f){
        f.classList.remove("activeFrame");
      });

      const frame = document.getElementById("frame-" + name);
      if(!frame){ return; }

      if(!frame.src || frame.src === "about:blank"){
        frame.src = frame.dataset.src;
      }

      frame.classList.add("activeFrame");

      try{
        if(frame.contentWindow && frame.contentWindow.refreshTab){
          frame.contentWindow.refreshTab();
        }
      } catch(e){}
    }

    function notifyPlayerUpdate(){
      loadPlayer();
      renderPlayer();
    }

    setInterval(function(){
      loadPlayer();
      renderPlayer();
    }, 2000);

    renderPlayer();
  </script>

</body>
</html>
