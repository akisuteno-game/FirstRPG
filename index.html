<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RPG+ドロップ</title>

<style>
body {
  background:black;
  color:#0f0;
  font-family:monospace;
  text-align:center;
}

#game {
  width:420px;
  margin:auto;
  border:2px solid #0f0;
  padding:10px;
}

button {
  margin:5px;
  padding:8px;
  background:black;
  color:#0f0;
  border:1px solid #0f0;
}

#menu {
  margin-top:10px;
  border:1px solid #0f0;
  padding:5px;
}
</style>
</head>

<body>

<h2>⚔ RPG+</h2>

<div id="game">

<div id="enemyName"></div>
HP:<span id="enemyHP"></span><br><br>

Lv:<span id="level"></span>
HP:<span id="playerHP"></span>
素材:<span id="mat"></span>

<div id="text"></div>

<button onclick="attack()">攻撃</button>
<button onclick="openUpgrade()">強化</button>
<button onclick="showStatus()">ステータス</button>
<button onclick="save()">セーブ</button>

<div id="menu"></div>

</div>

<script>
// ===== プレイヤー =====
let player = {
  hp:20,
  maxHP:20,
  atk:3,
  level:1,
  exp:0,
  mat:0 // 素材
};

// ===== 敵 =====
const enemies = [
  {name:"スライム", hp:10, drop:1},
  {name:"ゴブリン", hp:15, drop:2},
  {name:"ドラゴン", hp:25, drop:5}
];

let enemy;

// ===== 初期化 =====
function spawn(){
  enemy = {...enemies[Math.floor(Math.random()*enemies.length)]};
  setText(enemy.name+" 出現！");
}

// ===== テキスト =====
function setText(msg){
  document.getElementById("text").innerText = msg;
}

// ===== 攻撃 =====
function attack(){
  let dmg = player.atk;
  enemy.hp -= dmg;
  setText("攻撃 "+dmg);

  if(enemy.hp <= 0){
    win();
  }

  update();
}

// ===== 勝利 =====
function win(){
  player.exp += 5;

  // ドロップ
  player.mat += enemy.drop;

  setText("勝利！素材+"+enemy.drop);

  if(player.exp >= 10){
    player.level++;
    player.exp = 0;
    player.maxHP += 5;
    player.hp = player.maxHP;
  }

  setTimeout(spawn,1000);
}

// ===== 強化 =====
function openUpgrade(){
  let html = "<h3>強化</h3>";

  html += "攻撃強化 (素材3)<button onclick='upAtk()'>+</button><br>";
  html += "HP強化 (素材3)<button onclick='upHP()'>+</button><br>";

  document.getElementById("menu").innerHTML = html;
}

function upAtk(){
  if(player.mat < 3) return;
  player.mat -= 3;
  player.atk += 1;
  update();
}

function upHP(){
  if(player.mat < 3) return;
  player.mat -= 3;
  player.maxHP += 5;
  player.hp = player.maxHP;
  update();
}

// ===== ステータス =====
function showStatus(){
  let text = "<h3>ステータス</h3>";

  text += "Lv:"+player.level+"<br>";
  text += "HP:"+player.hp+"/"+player.maxHP+"<br>";
  text += "攻撃:"+player.atk+"<br>";
  text += "素材:"+player.mat+"<br>";

  document.getElementById("menu").innerHTML = text;
}

// ===== UI =====
function update(){
  document.getElementById("enemyName").innerText = enemy.name;
  document.getElementById("enemyHP").innerText = enemy.hp;
  document.getElementById("level").innerText = player.level;
  document.getElementById("playerHP").innerText = player.hp+"/"+player.maxHP;
  document.getElementById("mat").innerText = player.mat;
}

// ===== セーブ =====
function save(){
  localStorage.setItem("save", JSON.stringify(player));
  setText("セーブ完了");
}

function load(){
  let data = localStorage.getItem("save");
  if(data){
    player = JSON.parse(data);
  }
}

// ===== スタート =====
load();
spawn();
update();
</script>

</body>
</html>
