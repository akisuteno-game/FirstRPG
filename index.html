<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RPG 完全版</title>

<style>
body {
  background: #111;
  color: #eee;
  font-family: monospace;
  text-align: center;
}

#game {
  width: 420px;
  margin: auto;
  border: 2px solid #666;
  padding: 10px;
  background: #1a1a1a;
}

button {
  margin: 5px;
  padding: 8px;
  background: #333;
  color: white;
  border: 1px solid #888;
}

#menu {
  margin-top:10px;
  border:1px solid #555;
  padding:5px;
  background:#222;
}
</style>
</head>

<body>

<h2>⚔ RPG</h2>

<div id="game">

<div id="enemyName"></div>
HP:<span id="enemyHP"></span><br><br>

Lv:<span id="level"></span>
HP:<span id="playerHP"></span><br>
素材:<span id="mat"></span><br>

<div id="text"></div>

<button onclick="attack()">攻撃</button>
<button onclick="openUpgrade()">強化</button>
<button onclick="openGacha()">ガチャ</button>
<button onclick="showStatus()">ステータス</button>
<button onclick="save()">セーブ</button>

<div id="menu"></div>

</div>

<script>

// ===== プレイヤー =====
let player = {
  hp:20,
  maxHP:20,
  atk:3,
  level:1,
  exp:0,
  mat:0,
  items:{}
};

// ===== 敵 =====
const enemies = [
  {name:"スライム", hp:10, drop:"ゼリー"},
  {name:"ゴブリン", hp:15, drop:"牙"},
  {name:"ドラゴン", hp:25, drop:"鱗"}
];

let enemy;

// ===== 初期化 =====
function spawn(){
  enemy = {...enemies[Math.floor(Math.random()*enemies.length)]};
  setText(enemy.name+" 出現！");
}

// ===== テキスト =====
function setText(msg){
  document.getElementById("text").innerText = msg;
}

// ===== 攻撃 =====
function attack(){
  let dmg = player.atk;
  enemy.hp -= dmg;

  setText("攻撃 "+dmg);

  if(enemy.hp <= 0){
    win();
  }

  update();
}

// ===== 勝利 =====
function win(){
  player.exp += 5;

  // 通常ドロップ
  addItem(enemy.drop,1);

  // レアドロップ（20%）
  if(Math.random() < 0.2){
    addItem("レア素材",1);
    setText("レアドロップ！");
  } else {
    setText("勝利！");
  }

  if(player.exp >= 10){
    player.level++;
    player.exp = 0;
    player.maxHP += 5;
    player.hp = player.maxHP;
  }

  setTimeout(spawn,1000);
}

// ===== アイテム追加 =====
function addItem(name,num){
  if(!player.items[name]) player.items[name]=0;
  player.items[name]+=num;
}

// ===== 強化 =====
function openUpgrade(){
  let html = "<h3>強化</h3>";
  html += "攻撃+1（ゼリー2）<button onclick='upAtk()'>+</button><br>";
  html += "HP+5（牙2）<button onclick='upHP()'>+</button><br>";
  document.getElementById("menu").innerHTML = html;
}

function upAtk(){
  if((player.items["ゼリー"]||0) < 2) return;
  player.items["ゼリー"] -= 2;
  player.atk += 1;
  update();
}

function upHP(){
  if((player.items["牙"]||0) < 2) return;
  player.items["牙"] -= 2;
  player.maxHP += 5;
  player.hp = player.maxHP;
  update();
}

// ===== ガチャ =====
function openGacha(){
  let html = "<h3>ガチャ（レア素材1）</h3>";
  html += "<button onclick='gacha()'>引く</button>";
  document.getElementById("menu").innerHTML = html;
}

function gacha(){
  if((player.items["レア素材"]||0) < 1) return;

  player.items["レア素材"]--;

  let r = Math.random();

  if(r < 0.5){
    player.atk += 2;
    setText("攻撃+2！");
  } else {
    player.maxHP += 10;
    player.hp = player.maxHP;
    setText("HP+10！");
  }

  update();
}

// ===== ステータス =====
function showStatus(){
  let text = "<h3>ステータス</h3>";

  text += "Lv:"+player.level+"<br>";
  text += "HP:"+player.hp+"/"+player.maxHP+"<br>";
  text += "攻撃:"+player.atk+"<br><br>";

  text += "アイテム<br>";
  for(let key in player.items){
    text += key+"："+player.items[key]+"<br>";
  }

  document.getElementById("menu").innerHTML = text;
}

// ===== UI =====
function update(){
  document.getElementById("enemyName").innerText = enemy.name;
  document.getElementById("enemyHP").innerText = enemy.hp;
  document.getElementById("level").innerText = player.level;
  document.getElementById("playerHP").innerText = player.hp+"/"+player.maxHP;

  if(player.hp < player.maxHP/2){
    document.getElementById("playerHP").style.color = "red";
  } else {
    document.getElementById("playerHP").style.color = "white";
  }

  let total = 0;
  for(let k in player.items){
    total += player.items[k];
  }
  document.getElementById("mat").innerText = total;
}

// ===== セーブ =====
function save(){
  localStorage.setItem("save", JSON.stringify(player));
  setText("セーブ完了");
}

function load(){
  let data = localStorage.getItem("save");
  if(data){
    player = JSON.parse(data);

    // undefined対策
    if(player.mat === undefined) player.mat = 0;
    if(!player.items) player.items = {};
  }
}

// ===== スタート =====
load();
spawn();
update();

</script>

</body>
</html>
