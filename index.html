<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UIバトルRPG</title>

<style>
body {
  background: black;
  color: white;
  font-family: monospace;
  text-align: center;
}

#game {
  width: 400px;
  margin: auto;
}

#enemy {
  font-size: 24px;
  margin: 20px;
}

#status {
  border: 2px solid white;
  padding: 10px;
  margin: 10px;
}

#text {
  border: 2px solid white;
  padding: 10px;
  height: 60px;
  margin: 10px;
}

#commands button {
  width: 45%;
  margin: 5px;
  padding: 10px;
  background: black;
  color: white;
  border: 2px solid white;
}
</style>
</head>

<body>

<h2>⚔ バトルRPG</h2>

<div id="game">

  <div id="enemy">スライム</div>

  <div id="status">
    HP: <span id="playerHP">20</span>
  </div>

  <div id="text">敵が現れた！</div>

  <div id="commands">
    <button onclick="attack()">たたかう</button>
    <button onclick="run()">にげる</button>
  </div>

</div>

<script>
let playerHP = 20;
let enemyHP = 15;

function setText(msg){
  document.getElementById("text").innerText = msg;
}

function update(){
  document.getElementById("playerHP").innerText = playerHP;
}

function attack(){
  let dmg = Math.floor(Math.random()*5)+1;
  enemyHP -= dmg;
  setText("攻撃！ " + dmg + "ダメージ！");

  if(enemyHP <= 0){
    setText("敵を倒した！");
    setTimeout(resetBattle, 1500);
    return;
  }

  setTimeout(enemyTurn, 1000);
}

function enemyTurn(){
  let dmg = Math.floor(Math.random()*4)+1;
  playerHP -= dmg;

  setText("敵の攻撃！ " + dmg + "ダメージ！");

  if(playerHP <= 0){
    setText("やられた...");
    return;
  }

  update();
}

function run(){
  setText("にげた！");
  setTimeout(resetBattle, 1000);
}

function resetBattle(){
  enemyHP = 15;
  playerHP = 20;
  update();
  setText("新しい敵が現れた！");
}

update();
</script>

</body>
</html>
