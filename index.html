<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RPG ステージ制</title>

<style>
body { background:#111; color:#eee; font-family:monospace; margin:0; }
#container { display:flex; }

#statusPanel {
  width:220px;
  border-right:2px solid #444;
  padding:10px;
  background:#1a1a1a;
}

#game { flex:1; padding:10px; }

button {
  margin:5px;
  padding:8px;
  background:#333;
  color:white;
  border:1px solid #888;
}

.locked { opacity:0.3; }

.bar { width:100%; height:12px; background:#333; }
.fill { height:100%; background:lime; width:0%; }

#menu {
  margin-top:10px;
  border:1px solid #555;
  padding:5px;
  background:#222;
}
</style>
</head>

<body>

<div id="container">

<div id="statusPanel">
  <h3>ステータス</h3>
  Lv:<span id="level"></span><br>

  HP:
  <div class="bar"><div id="hpBar" class="fill"></div></div>
  <span id="playerHP"></span><br>

  攻撃:<span id="atk"></span><br>
  クリ率:<span id="critRate"></span>%<br>
  クリ倍率:<span id="critDmg"></span>x<br><br>

  <b>素材</b>
  <div id="items"></div>
</div>

<div id="game">

<div id="main"></div>

<div id="menu"></div>

</div>

</div>

<script>

// ===== プレイヤー =====
let player = {
  hp:20,maxHP:20,atk:3,
  critRate:10,critDmg:1.5,
  level:1,exp:0,nextExp:10,
  items:{},
  unlocked:1
};

let enemy = null;

// ===== 敵リスト（増量） =====
const enemies = [
  {name:"スライム", hp:10, atk:2, drop:"ゼリー"},
  {name:"ゴブリン", hp:15, atk:3, drop:"牙"},
  {name:"オーク", hp:25, atk:4, drop:"骨"},
  {name:"魔法使い", hp:20, atk:5, drop:"魔石"},
  {name:"騎士", hp:35, atk:6, drop:"鉄"},
  {name:"ドラゴン", hp:50, atk:8, drop:"鱗"}
];

// ===== 敵選択画面 =====
function showStageSelect(){
  let html = "<h3>敵を選択</h3>";

  enemies.forEach((e,i)=>{
    if(i < player.unlocked){
      html += `<button onclick="startBattle(${i})">${e.name}</button><br>`;
    } else {
      html += `<button class="locked">${e.name}（未解放）</button><br>`;
    }
  });

  document.getElementById("main").innerHTML = html;
}

// ===== 戦闘開始 =====
function startBattle(i){
  enemy = {...enemies[i]};
  enemy.maxHP = enemy.hp;

  setText(enemy.name+" と戦闘開始！");
  showBattle();
}

// ===== 戦闘画面 =====
function showBattle(){
  let html = `
  <h3 id="enemyName">${enemy.name}</h3>

  HP:
  <div class="bar"><div id="enemyBar" class="fill"></div></div>
  <span id="enemyHP"></span><br><br>

  <button onclick="attack()">攻撃</button>
  <button onclick="escape()">逃げる</button>

  <div id="text"></div>
  `;

  document.getElementById("main").innerHTML = html;
  update();
}

// ===== 攻撃 =====
function attack(){
  let dmg = player.atk;

  if(Math.random()*100 < player.critRate){
    dmg = Math.floor(dmg*player.critDmg);
    setText("クリティカル！ "+dmg);
  } else {
    setText("攻撃 "+dmg);
  }

  enemy.hp -= dmg;

  if(enemy.hp <= 0){
    win();
    return;
  }

  // 敵攻撃
  player.hp -= enemy.atk;
  if(player.hp <= 0){
    setText("ゲームオーバー");
    return;
  }

  update();
}

// ===== 勝利 =====
function win(){
  addItem(enemy.drop,1);
  setText("勝利！");

  // 解放
  let index = enemies.findIndex(e=>e.name===enemy.name);
  if(index+1 > player.unlocked){
    player.unlocked = index+1;
  }

  setTimeout(showStageSelect,1000);
}

// ===== 逃げる =====
function escape(){
  showStageSelect();
}

// ===== UI =====
function update(){
  if(!enemy) return;

  document.getElementById("enemyHP").innerText =
    enemy.hp+"/"+enemy.maxHP;

  document.getElementById("enemyBar").style.width =
    (enemy.hp/enemy.maxHP*100)+"%";

  document.getElementById("level").innerText = player.level;
  document.getElementById("playerHP").innerText =
    player.hp+"/"+player.maxHP;

  document.getElementById("atk").innerText = player.atk;
  document.getElementById("critRate").innerText = player.critRate;
  document.getElementById("critDmg").innerText = player.critDmg;

  let ratio = player.hp/player.maxHP;
  let bar = document.getElementById("hpBar");
  bar.style.width = ratio*100+"%";

  if(ratio < 0.1) bar.style.background="red";
  else if(ratio < 0.5) bar.style.background="orange";
  else bar.style.background="lime";

  let html="";
  for(let k in player.items){
    html += k+"："+player.items[k]+"<br>";
  }
  document.getElementById("items").innerHTML = html;
}

// ===== その他 =====
function addItem(n,c){
  if(!player.items[n]) player.items[n]=0;
  player.items[n]+=c;
}

function setText(t){
  document.getElementById("text").innerText = t;
}

// ===== スタート =====
showStageSelect();
update();

</script>

</body>
</html>
