<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ゲージRPG+</title>

<style>
body {
  background: radial-gradient(#111, #000);
  color: #0f0;
  font-family: monospace;
  text-align: center;
}

#game {
  width: 420px;
  margin: auto;
  border: 2px solid #0f0;
  padding: 10px;
  background: #000;
}

.bar {
  height: 12px;
  background: #222;
  margin: 5px 0;
}

.fill {
  height: 100%;
  background: lime;
  width: 0%;
  transition: width 0.1s;
}

.enemy {
  font-size: 22px;
  margin: 10px;
}

#text {
  border: 1px solid #0f0;
  height: 60px;
  padding: 5px;
  margin: 10px 0;
}

button {
  width: 30%;
  margin: 5px;
  padding: 10px;
  background: black;
  color: #0f0;
  border: 1px solid #0f0;
}

button:disabled {
  opacity: 0.3;
}
</style>
</head>

<body>

<h2>⚔ ゲージRPG+</h2>

<div id="game">

<div class="enemy" id="enemyName"></div>
<div>HP: <span id="enemyHP"></span></div>
<div class="bar"><div id="enemyGauge" class="fill"></div></div>

<hr>

<div>Lv:<span id="level"></span> HP:<span id="playerHP"></span></div>
<div class="bar"><div id="playerGauge" class="fill"></div></div>

<div id="text"></div>

<div>
  <button id="atkBtn" onclick="attack()">攻撃</button>
  <button id="skillBtn" onclick="skill()">スキル</button>
  <button onclick="save()">セーブ</button>
</div>

</div>

<script>
// ===== データ =====
let player = {
  hp: 20,
  maxHP: 20,
  level: 1,
  exp: 0,
  gauge: 0
};

let enemies = [
  {name:"スライム", hp:10, speed:1},
  {name:"ゴブリン", hp:15, speed:1.5},
  {name:"ドラゴン", hp:30, speed:0.6}
];

let enemy;

// ===== 初期化 =====
function spawn(){
  enemy = {...enemies[Math.floor(Math.random()*enemies.length)]};
  enemy.gauge = 0;
  setText(enemy.name+" が現れた！");
}

// ===== テキスト（タイプ風） =====
function setText(msg){
  let el = document.getElementById("text");
  el.innerText = "";
  let i = 0;
  let interval = setInterval(()=>{
    el.innerText += msg[i];
    i++;
    if(i>=msg.length) clearInterval(interval);
  },30);
}

// ===== 行動 =====
function attack(){
  if(player.gauge < 100) return;
  player.gauge = 0;

  let dmg = rand(3,6);
  enemy.hp -= dmg;
  setText("攻撃！ "+dmg+"ダメージ");

  if(enemy.hp <= 0){
    win();
  }
}

function skill(){
  if(player.gauge < 100) return;
  player.gauge = 0;

  let dmg = rand(6,12);
  enemy.hp -= dmg;
  setText("必殺技！ "+dmg+"ダメージ");

  if(enemy.hp <= 0){
    win();
  }
}

function enemyTurn(){
  let dmg = rand(2,5);
  player.hp -= dmg;
  setText(enemy.name+" の攻撃！ "+dmg);

  if(player.hp <= 0){
    setText("ゲームオーバー");
  }
}

// ===== 勝利 =====
function win(){
  let gain = 5;
  player.exp += gain;

  if(player.exp >= 10){
    player.level++;
    player.exp = 0;
    player.maxHP += 5;
    player.hp = player.maxHP;
    setText("レベルアップ！ Lv."+player.level);
  } else {
    setText("勝利！ EXP+"+gain);
  }

  setTimeout(spawn,1000);
}

// ===== ループ =====
function loop(){
  player.gauge += 1.2;
  enemy.gauge += enemy.speed;

  if(player.gauge > 100) player.gauge = 100;

  if(enemy.gauge >= 100){
    enemy.gauge = 0;
    enemyTurn();
  }

  update();
  requestAnimationFrame(loop);
}

// ===== UI =====
function update(){
  set("playerHP", player.hp);
  set("enemyHP", enemy.hp);
  set("level", player.level);

  width("playerGauge", player.gauge);
  width("enemyGauge", enemy.gauge);

  // ボタン制御
  document.getElementById("atkBtn").disabled = player.gauge < 100;
  document.getElementById("skillBtn").disabled = player.gauge < 100;

  document.getElementById("enemyName").innerText = enemy.name;
}

function set(id,val){
  document.getElementById(id).innerText = val;
}

function width(id,val){
  document.getElementById(id).style.width = val+"%";
}

function rand(a,b){
  return Math.floor(Math.random()*(b-a+1))+a;
}

// ===== セーブ =====
function save(){
  localStorage.setItem("rpgSave", JSON.stringify(player));
  setText("セーブした！");
}

function load(){
  let data = localStorage.getItem("rpgSave");
  if(data){
    player = JSON.parse(data);
  }
}

// ===== スタート =====
load();
spawn();
loop();
</script>

</body>
</html>
