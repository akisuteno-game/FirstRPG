<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>敵選択</title>
<style>
body {
  background:#111;
  color:#eee;
  font-family:monospace;
  text-align:center;
}
button {
  margin:5px;
  padding:10px;
  background:#333;
  color:white;
  border:1px solid #888;
}
</style>
</head>

<body>

<h2>敵を選択</h2>
<div id="list"></div>

<script>
// ===== データ =====
const enemies = [
  {id:0,name:"スライム",hp:10,atk:2},
  {id:1,name:"ゴブリン",hp:15,atk:3},
  {id:2,name:"オーク",hp:25,atk:4},
  {id:3,name:"ドラゴン",hp:40,atk:6}
];

// ===== 初期化 =====
window.onload = () => {
  const list = document.getElementById("list");

  enemies.forEach(e=>{
    const btn = document.createElement("button");
    btn.textContent = e.name;

    btn.onclick = ()=>{
      location.href = "battle.html?enemy="+e.id;
    };

    list.appendChild(btn);
    list.appendChild(document.createElement("br"));
  });
};
</script>

</body>
</html>
