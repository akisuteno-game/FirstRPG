<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RPG</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 左 -->
<div id="side">

  <div id="status"></div>

</div>


<!-- 右 -->
<div id="main">

  <!-- タブ -->
  <div id="tabs">

    <button
      class="tabBtn"

      onclick="
      showTab(
        'enemyTab',
        'enemyTab.html'
      )">

      敵選択

    </button>


    <button
      class="tabBtn"

      onclick="
      showTab(
        'upgradeTab',
        'upgradeTab.html'
      )">

      強化

    </button>


    <button
      class="tabBtn"

      onclick="
      showTab(
        'settingTab',
        'settingTab.html'
      )">

      設定

    </button>

  </div>


  <!-- 真ん中 -->
  <div id="topArea">

    <div
      id="enemyTab"
      class="tabPage">
    </div>


    <div
      id="upgradeTab"
      class="tabPage">
    </div>


    <div
      id="settingTab"
      class="tabPage">
    </div>

  </div>


  <!-- 下 -->
  <div id="battleArea">

    放置RPG

  </div>

</div>


<script src="data.js"></script>
<script src="player.js"></script>

<script src="enemyTab.js"></script>
<script src="upgradeTab.js"></script>
<script src="settingTab.js"></script>

<script src="main.js"></script>

</body>
</html>
