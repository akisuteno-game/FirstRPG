<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RPG</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: monospace;
}

#game {
  background: #222;
  border: 3px solid white;
}

#ui {
  margin-top: 10px;
}

button {
  font-size: 18px;
  margin: 5px;
  padding: 10px 20px;
  background: black;
  color: white;
  border: 2px solid white;
}
</style>
</head>

<body>

<h2>⚔ ミニRPG</h2>
<p id="status">Lv:1 EXP:0</p>

<canvas id="game" width="400" height="300"></canvas>

<div id="ui">
  <button onclick="move('up')">↑</button><br>
  <button onclick="move('left')">←</button>
  <button onclick="move('down')">↓</button>
  <button onclick="move('right')">→</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = { x: 50, y: 50, size: 20 };
let enemy = { x: 200, y: 150, size: 20 };

let exp = 0;
let level = 1;

function move(dir) {
  if (dir === "up") player.y -= 10;
  if (dir === "down") player.y += 10;
  if (dir === "left") player.x -= 10;
  if (dir === "right") player.x += 10;
}

document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowUp") move("up");
  if (e.key === "ArrowDown") move("down");
  if (e.key === "ArrowLeft") move("left");
  if (e.key === "ArrowRight") move("right");
});

function isColliding(a, b) {
  return a.x < b.x + b.size &&
         a.x + a.size > b.x &&
         a.y < b.y + b.size &&
         a.y + a.size > b.y;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 背景グリッド（それっぽさUP）
  ctx.strokeStyle = "#444";
  for (let i = 0; i < 400; i += 40) {
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i, 300);
    ctx.stroke();
  }
  for (let i = 0; i < 300; i += 40) {
    ctx.beginPath();
    ctx.moveTo(0, i);
    ctx.lineTo(400, i);
    ctx.stroke();
  }

  // 敵
  ctx.fillStyle = "lime";
  ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);

  // プレイヤー
  ctx.fillStyle = "white";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // 戦闘
  if (isColliding(player, enemy)) {
    exp += 5;
    alert("勝利！");

    if (exp >= 10) {
      level++;
      exp = 0;
      alert("レベルアップ！");
    }

    enemy.x = Math.random() * 350;
    enemy.y = Math.random() * 250;
  }

  document.getElementById("status").innerText =
    "Lv:" + level + " EXP:" + exp;

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
