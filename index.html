<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RPG</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- 左：ステータス -->
  <div class="left">
    <h3>ステータス</h3>

    HP:
    <div class="bar"><div id="hpBar" class="fill"></div></div>
    <span id="hp"></span><br><br>

    攻撃:<span id="atk"></span><br>
    クリ率:<span id="crit"></span>%<br><br>

    <h4>素材</h4>
    <div id="items"></div>
  </div>

  <!-- 右：操作 -->
  <div class="right">
    <h2>敵を選択</h2>
    <div id="list"></div>

    <hr>

    <h3>強化</h3>
    <button onclick="upgradeAtk()">攻撃+1（ゼリー2）</button><br>
    <button onclick="upgradeCrit()">クリ率+1%（牙2）</button><br><br>

    <h3>設定</h3>
    <button onclick="save()">保存</button>
    <button onclick="resetData()">データ削除</button>
  </div>

</div>

<script src="data.js"></script>
<script src="player.js"></script>
<script src="main.js"></script>

</body>
</html>
