<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RPG 完成版</title>

<style>
body {
  background:#111;
  color:#eee;
  font-family:monospace;
  text-align:center;
}

button {
  margin:5px;
  padding:10px;
  background:#333;
  color:white;
  border:1px solid #888;
}

.bar {
  width:200px;
  height:12px;
  background:#333;
  margin:auto;
}

.fill {
  height:100%;
  width:0%;
  background:lime;
}
</style>
</head>

<body>

<h2 id="enemyName"></h2>

HP:
<div class="bar"><div id="enemyBar" class="fill"></div></div>
<span id="enemyHP"></span><br>

ゲージ:
<div class="bar"><div id="enemyGauge" class="fill"></div></div>

<hr>

あなた

HP:
<div class="bar"><div id="playerBar" class="fill"></div></div>
<span id="playerHP"></span><br>

ゲージ:
<div class="bar"><div id="playerGauge" class="fill"></div></div><br>

攻撃:<span id="atk"></span><br>
クリ率:<span id="crit"></span>%<br><br>

<button id="attackBtn" onclick="attack()">攻撃</button>
<button onclick="upgrade()">強化</button>
<button onclick="back()">戻る</button>

<div id="text"></div>

<script>

// ===== 敵データ =====
const enemies = [
  {id:0,name:"スライム",hp:10,atk:2,speed:1,drop:"ゼリー"},
  {id:1,name:"ゴブリン",hp:15,atk:3,speed:1.2,drop:"牙"},
  {id:2,name:"オーク",hp:25,atk:4,speed:0.9,drop:"骨"},
  {id:3,name:"ドラゴン",hp:40,atk:6,speed:0.7,drop:"鱗"}
];

// ===== プレイヤー =====
let player = JSON.parse(localStorage.getItem("player")) || {
  hp:20,
  maxHP:20,
  atk:3,
  crit:10,
  speed:1.2,
  items:{}
};

// ===== HP補正 =====
function fixHP(){
  player.hp = Math.floor(player.hp);
  if(player.hp < 0) player.hp = 0;
  if(player.hp > player.maxHP) player.hp = player.maxHP;
}

// ===== 敵取得 =====
const params = new URLSearchParams(location.search);
let id = parseInt(params.get("enemy"));
if(isNaN(id)) id = 0;

let enemy = {...enemies[id]};
enemy.maxHP = enemy.hp;
enemy.gauge = 0;

let playerGauge = 0;
let battleEnd = false;

// ===== UI =====
const enemyName = document.getElementById("enemyName");
const enemyHP = document.getElementById("enemyHP");
const enemyBar = document.getElementById("enemyBar");
const enemyGauge = document.getElementById("enemyGauge");

const playerHP = document.getElementById("playerHP");
const playerBar = document.getElementById("playerBar");
const playerGaugeBar = document.getElementById("playerGauge");

const atk = document.getElementById("atk");
const crit = document.getElementById("crit");

const text = document.getElementById("text");
const btn = document.getElementById("attackBtn");

enemyName.innerText = enemy.name;

// ===== 攻撃 =====
function attack(){
  if(playerGauge < 100 || battleEnd) return;

  playerGauge = 0;

  let dmg = player.atk;

  if(Math.random()*100 < player.crit){
    dmg = Math.floor(dmg * 2);
    text.innerText = "クリティカル！ " + dmg;
  } else {
    text.innerText = "攻撃 " + dmg;
  }

  if(enemy.hp - dmg <= 0){
    enemy.hp = 0;
    win();
    return;
  }

  enemy.hp -= dmg;
}

// ===== 敵攻撃 =====
function enemyAttack(){
  if(battleEnd) return;

  if(player.hp - enemy.atk <= 0){
    player.hp = 0;
    text.innerText = "ゲームオーバー";
    battleEnd = true;

    save();

    setTimeout(()=>{
      location.href = "index.html";
    }, 1000);

    return;
  }

  player.hp -= enemy.atk;
  text.innerText = enemy.name + "の攻撃 " + enemy.atk;
}

// ===== 勝利 =====
function win(){
  battleEnd = true;

  addItem(enemy.drop,1);
  text.innerText = "勝利！ " + enemy.drop + "ゲット";

  save();
}

// ===== 強化 =====
function upgrade(){
  if((player.items["ゼリー"]||0) >= 2){
    player.items["ゼリー"] -= 2;
    player.atk++;
    text.innerText = "攻撃アップ！";
  }
}

// ===== ループ =====
function loop(){

  if(!battleEnd){
    playerGauge += player.speed;
    enemy.gauge += enemy.speed;

    if(playerGauge > 100) playerGauge = 100;

    if(enemy.gauge >= 100){
      enemy.gauge = 0;
      enemyAttack();
    }
  }

  fixHP();
  enemy.hp = Math.max(0, Math.floor(enemy.hp));

  update();
  requestAnimationFrame(loop);
}

// ===== UI更新 =====
function update(){

  fixHP();
  enemy.hp = Math.max(0, Math.floor(enemy.hp));

  enemyHP.innerText = enemy.hp + "/" + enemy.maxHP;
  playerHP.innerText = player.hp + "/" + player.maxHP;

  let pr = player.hp / player.maxHP;
  let er = enemy.hp / enemy.maxHP;

  playerBar.style.width = (pr * 100) + "%";
  enemyBar.style.width = (er * 100) + "%";

  playerGaugeBar.style.width = playerGauge + "%";
  enemyGauge.style.width = enemy.gauge + "%";

  atk.innerText = player.atk;
  crit.innerText = player.crit;

  btn.disabled = playerGauge < 100 || battleEnd;

  // プレイヤー色
  if(pr < 0.1) playerBar.style.background = "red";
  else if(pr < 0.5) playerBar.style.background = "orange";
  else playerBar.style.background = "lime";

  // 敵色
  if(er < 0.1) enemyBar.style.background = "red";
  else if(er < 0.5) enemyBar.style.background = "orange";
  else enemyBar.style.background = "lime";
}

// ===== その他 =====
function addItem(n,c){
  if(!player.items[n]) player.items[n]=0;
  player.items[n]+=c;
}

function save(){
  fixHP();
  localStorage.setItem("player", JSON.stringify(player));
}

function back(){
  save();
  location.href = "index.html";
}

// ===== スタート =====
loop();

</script>

</body>
</html>
