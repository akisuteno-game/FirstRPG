<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>バトル</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 左 -->
<div id="side">
  <h3>ステータス</h3>
  <div id="status"></div>
</div>

<!-- メイン -->
<div id="main">

  <!-- 上：敵 -->
  <div class="section">
    <h2 id="enemyName"></h2>

    <div class="bar">
      <div id="enemyBar" class="fill"></div>
      <div id="enemyHP" class="hpText"></div>
    </div>

    ゲージ
    <div class="bar">
      <div id="enemyGauge" class="fill"></div>
    </div>
  </div>

  <!-- 中：操作 -->
  <div class="section">
    <button id="attackBtn" onclick="attack()">攻撃</button>
    <button onclick="upgrade()">強化</button>
    <button onclick="back()">戻る</button>

    <div id="text"></div>
  </div>

  <!-- 下：プレイヤー -->
  <div class="section">
    あなた

    <div class="bar">
      <div id="playerBar" class="fill"></div>
      <div id="playerHP" class="hpText"></div>
    </div>

    ゲージ
    <div class="bar">
      <div id="playerGauge" class="fill"></div>
    </div>

    攻撃:<span id="atk"></span><br>
    クリ率:<span id="crit"></span>%
  </div>

</div>

<script src="data.js"></script>
<script src="player.js"></script>
<script src="battle.js"></script>

<script>
// 左ステータス
function drawStatus(){
  const s = document.getElementById("status");

  s.innerHTML =
    "HP: " + player.hp + "/" + player.maxHP + "<br>" +
    "攻撃: " + player.atk + "<br>" +
    "クリ率: " + player.crit + "%<br>" +
    "素材:<br>" + JSON.stringify(player.items);
}

setInterval(()=>{
  fixHP();
  drawStatus();
},300);
</script>

</body>
</html>
