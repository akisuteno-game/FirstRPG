<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>バトル</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="side">
  <div id="status"></div>
</div>

<div id="main">

  <div class="section">

    <h2 id="enemyName"></h2>

    <div class="bar">
      <div id="enemyBar" class="fill"></div>
      <div id="enemyHP" class="hpText"></div>
    </div>

    <div class="bar">
      <div id="enemyGauge" class="fill"></div>
    </div>

  </div>


  <div class="section">

    <button id="attackBtn" onclick="attack()">
      攻撃
    </button>

    <button onclick="upgrade()">
      強化
    </button>

    <button onclick="back()">
      戻る
    </button>

    <div id="text"></div>

  </div>


  <div class="section">

    あなた

    <div class="bar">
      <div id="playerBar" class="fill"></div>
      <div id="playerHP" class="hpText"></div>
    </div>

    <div class="bar">
      <div id="playerGauge" class="fill"></div>
    </div>

    攻撃:<span id="atk"></span><br>
    クリ率:<span id="crit"></span>%

  </div>

</div>

<script src="data.js"></script>
<script src="player.js"></script>
<script src="battle.js"></script>
<script src="main.js"></script>

</body>
</html>
