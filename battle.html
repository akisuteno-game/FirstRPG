<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battle</title>
  <link rel="stylesheet" href="style.css?v=9999">
  <style>
    .battleWrap {
      width: 100%;
      text-align: center;
      color: white;
      padding: 20px;
    }
    .hpBox {
      width: 280px;
      height: 18px;
      border: 1px solid #555;
      margin: 6px auto;
      overflow: hidden;
      background: #1a1a1a;
    }
    .hpFill {
      width: 100%;
      height: 100%;
      background: lime;
    }
    .gaugeBox {
      width: 280px;
      height: 22px;
      background: #1a1a1a;
      border: 2px solid #444;
      overflow: hidden;
      margin: 4px auto;
    }
    .gaugeFill {
      width: 0%;
      height: 100%;
    }
    .buttonRow {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
    }
    .battleBtn {
      width: 200px;
      height: 56px;
      font-size: 18px;
      font-family: monospace;
      font-weight: bold;
      background: #222;
      color: white;
      border: 2px solid #555;
      cursor: pointer;
      min-width: unset;
      min-height: unset;
      padding: 0;
    }
    .battleBtn:hover:not(:disabled) { background: #2a2a2a; }
    .battleBtn:disabled { opacity: 0.4; cursor: default; }
    #battleArea {
      width: 100vw;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 20px;
      position: relative;
      background: #111;
    }
  </style>
</head>
<body style="margin:0;background:#111;">

  <div id="battleArea"></div>

  <!-- 依存順に読み込む -->
  <script src="data.js?v=9999"></script>
  <script src="js/player_data.js?v=9999"></script>
  <script src="js/player_material.js?v=9999"></script>
  <script src="js/player_render.js?v=9999"></script>
  <script src="js/skill_data.js?v=9999"></script>
  <script src="js/skill_logic.js?v=9999"></script>
  <script src="js/rebirth_data.js?v=9999"></script>
  <script src="js/rebirth_logic.js?v=9999"></script>
  <script src="js/craft_data.js?v=9999"></script>
  <script src="js/craft_logic.js?v=9999"></script>
  <!-- battle_logicを先に、battle_renderが最後（initBattle()を呼ぶ） -->
  <script src="js/battle_logic.js?v=9999"></script>
  <script src="js/battle_render.js?v=9999"></script>

</body>
</html>
