<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1.0
  "
>

<title>Battle</title>

<link
  rel="stylesheet"
  href="style.css"
>

</head>


<body>


  <!-- 左 -->
  <div id="side">

    <h2>
      ステータス
    </h2>

    <div id="playerUI">
    </div>

  </div>



  <!-- 右 -->
  <div id="main">


    <div id="battleArea">


      <h2
        id="enemyName"
      >
      </h2>



      HP

      <div
        class="bar"
      >

        <div
          id="enemyBar"

          class="fill"
        >
        </div>

      </div>


      <div
        id="enemyHP"
      >
      </div>



      ゲージ

      <div
        class="bar"
      >

        <div
          id="enemyGauge"

          class="fill"
        >
        </div>

      </div>


      <hr>



      あなた



      HP

      <div
        class="bar"
      >

        <div
          id="playerBar"

          class="fill"
        >
        </div>

      </div>


      <div
        id="playerHP"
      >
      </div>



      ゲージ

      <div
        class="bar"
      >

        <div
          id="playerGauge"

          class="fill"
        >
        </div>

      </div>


      <br>



      <button
        id="attackBtn"

        onclick="
          attack()
        "
      >
        攻撃
      </button>



      <button
        onclick="
          back()
        "
      >
        戻る
      </button>



      <div
        id="text"
      >
      </div>


    </div>


  </div>



<script src="data.js"></script>

<script src="player.js"></script>

<script src="battle.js"></script>


</body>
</html>
