<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>バトル</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="side">
  <h3>ステータス</h3>
  <div id="status"></div>
</div>

<div id="main">

<h2 id="enemyName"></h2>

HP:
<div class="bar"><div id="enemyBar" class="fill"></div></div>
<span id="enemyHP"></span><br>

ゲージ:
<div class="bar"><div id="enemyGauge" class="fill"></div></div>

<hr>

あなた

HP:
<div class="bar"><div id="playerBar" class="fill"></div></div>
<span id="playerHP"></span><br>

ゲージ:
<div class="bar"><div id="playerGauge" class="fill"></div></div><br>

攻撃:<span id="atk"></span><br>
クリ率:<span id="crit"></span>%<br><br>

<button id="attackBtn" onclick="attack()">攻撃</button>
<button onclick="upgrade()">強化</button>
<button onclick="back()">戻る</button>

<div id="text"></div>

</div>

<script src="data.js"></script>
<script src="player.js"></script>
<script src="battle.js"></script>

<script>
// 左ステータス更新
function drawStatus(){
  const s = document.getElementById("status");

  s.innerHTML =
    "HP: " + player.hp + "/" + player.maxHP + "<br>" +
    "攻撃: " + player.atk + "<br>" +
    "クリ率: " + player.crit + "%<br>" +
    "素材:<br>" + JSON.stringify(player.items);
}

setInterval(()=>{
  fixHP();
  drawStatus();
}, 300);
</script>

</body>
</html>
