<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="tab_base.css">
  <style>
    .wrap { padding:12px; }
    h2 { font-size:14px; color:#555; margin-bottom:10px; }
    .matRow { display:flex; align-items:center; gap:8px; padding:6px 8px; background:#0f0f0f; border:1px solid #1a1a1a; margin-bottom:4px; }
    .matRow img { width:20px; height:20px; object-fit:contain; }
    .matRow .emoji { font-size:16px; width:20px; text-align:center; }
    .matRow .name { flex:1; font-size:12px; color:#ccc; }
    .matRow .count { font-size:12px; color:#666; }
    .empty { color:#333; font-size:12px; padding:20px; text-align:center; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>── 素材 ──</h2>
    <div id="matList"></div>
  </div>
  <script src="../data.js?v=9999"></script>
  <script src="../js/player_data.js?v=9999"></script>
  <script src="../js/player_material.js?v=9999"></script>
  <script>
    function refreshTab(){ loadPlayer(); render(); }

    function render(){
      loadPlayer();
      const el = document.getElementById("matList");
      if(!el){ return; }
      const html = createMaterialHTML();
      el.innerHTML = html ||
        `<div class="empty">素材がありません<br><span style="font-size:10px;color:#222;">敵を倒すと素材が手に入ります</span></div>`;
    }

    render();
  </script>
</body>
</html>
